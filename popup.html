<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>صافي - حالة الجلسة</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:300px;font-family:Tahoma,Arial,sans-serif;background:#2D1B69;}
.card{padding:16px 14px;}
.logo-row{display:table;width:100%;margin-bottom:10px;}
.logo-mini{display:table-cell;width:34px;vertical-align:middle;}
.logo-circle{width:32px;height:32px;border-radius:50%;background:#F5C842;display:table;text-align:center;}
.logo-circle svg{display:inline-block;vertical-align:middle;margin-top:7px;}
.logo-txt{display:table-cell;vertical-align:middle;padding-right:8px;}
.logo-name{font-size:15px;font-weight:bold;color:#fff;letter-spacing:1px;}
.logo-name span{color:#F5C842;}
.logo-sub{font-size:10px;color:rgba(255,255,255,0.5);margin-top:1px;}
.badge{display:block;background:rgba(74,222,128,0.15);border:1px solid rgba(74,222,128,0.35);border-radius:16px;padding:3px 0;font-size:11px;font-weight:bold;color:#4ADE80;text-align:center;margin-bottom:10px;}
.dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:#4ADE80;margin-left:5px;vertical-align:middle;}
.divider{border:none;border-top:1px solid rgba(245,200,66,0.2);margin:8px 0;}
.warn{display:none;background:rgba(255,80,80,0.12);border:1px solid rgba(255,80,80,0.3);border-radius:6px;padding:6px 10px;font-size:11px;color:#ffaaaa;text-align:center;margin-bottom:8px;}
.warn.show{display:block;}
.user-box{background:rgba(245,200,66,0.06);border:1px solid rgba(245,200,66,0.12);border-radius:8px;padding:8px 10px;margin-bottom:10px;}
.u-name{font-size:13px;font-weight:bold;color:#fff;}
.u-ip{font-size:10px;color:rgba(255,255,255,0.5);margin-top:2px;}
.grid{display:table;width:100%;border-collapse:separate;border-spacing:5px;margin-bottom:10px;}
.grid-row{display:table-row;}
.grid-cell{display:table-cell;width:50%;background:rgba(255,255,255,0.04);border:1px solid rgba(245,200,66,0.1);border-radius:7px;padding:8px 4px;text-align:center;vertical-align:middle;}
.g-icon{font-size:14px;display:block;margin-bottom:2px;}
.g-val{font-size:13px;font-weight:bold;color:#F5C842;display:block;}
.g-lbl{font-size:9px;color:rgba(255,255,255,0.5);display:block;margin-top:1px;}
.btn-row{display:table;width:100%;border-collapse:separate;border-spacing:6px;margin-bottom:8px;}
.btn-cell{display:table-cell;width:50%;}
.btn-ref{display:block;height:36px;background:rgba(245,200,66,0.1);border:1px solid rgba(245,200,66,0.25);border-radius:7px;color:#F5C842;font-family:Tahoma,Arial,sans-serif;font-size:11px;font-weight:bold;text-align:center;line-height:36px;text-decoration:none;}
.btn-ref:hover{background:rgba(245,200,66,0.18);}
.btn-out{display:block;height:36px;background:rgba(192,57,43,0.15);border:1px solid rgba(192,57,43,0.3);border-radius:7px;color:#FF8C7A;font-family:Tahoma,Arial,sans-serif;font-size:11px;font-weight:bold;text-align:center;line-height:36px;text-decoration:none;}
.btn-out:hover{background:rgba(192,57,43,0.25);}
.ref-txt{text-align:center;font-size:9px;color:rgba(255,255,255,0.2);}
.ref-txt span{color:rgba(245,200,66,0.4);}
</style>
</head>
<body>
<div class="card">

  <div class="logo-row">
    <div class="logo-mini">
      <div class="logo-circle">
        <svg width="16" height="16" viewBox="0 0 40 40" fill="none">
          <path d="M20 6C12.268 6 6 12.268 6 20C6 27.732 12.268 34 20 34C27.732 34 34 27.732 34 20" stroke="#2D1B69" stroke-width="3" stroke-linecap="round"/>
          <path d="M20 12C15.582 12 12 15.582 12 20C12 24.418 15.582 28 20 28C24.418 28 28 24.418 28 20" stroke="#2D1B69" stroke-width="3" stroke-linecap="round"/>
          <circle cx="20" cy="20" r="4" fill="#2D1B69"/>
        </svg>
      </div>
    </div>
    <div class="logo-txt">
      <div class="logo-name">ص<span>ا</span>في</div>
      <div class="logo-sub">بوابة الإنترنت اللاسلكي</div>
    </div>
  </div>

  <span class="badge"><span class="dot"></span>متصل بالإنترنت</span>

  <div class="warn" id="wb">[!] جلستك على وشك الانتهاء!</div>

  <div class="user-box">
    <div class="u-name" id="un">$(username)</div>
    <div class="u-ip">IP: $(ip)</div>
  </div>

  <div class="grid">
    <div class="grid-row">
      <div class="grid-cell"><span class="g-icon"></span><span class="g-val">$(session-time)</span><span class="g-lbl">مدة الجلسة</span></div>
      <div class="grid-cell"><span class="g-icon"></span><span class="g-val" id="clk">--:--</span><span class="g-lbl">الوقت الحالي</span></div>
    </div>
    <div class="grid-row">
      <div class="grid-cell"><span class="g-icon">[v]</span><span class="g-val" id="bi">$(bytes-in)</span><span class="g-lbl">وارد</span></div>
      <div class="grid-cell"><span class="g-icon">[^]</span><span class="g-val" id="bo">$(bytes-out)</span><span class="g-lbl">صادر</span></div>
    </div>
  </div>

  <div class="divider"></div>

  <div class="btn-row">
    <div class="btn-cell"><a class="btn-ref" href="$(link-status)"> تحديث</a></div>
    <div class="btn-cell"><a class="btn-out" href="$(link-logout)"> خروج</a></div>
  </div>

  <div class="ref-txt">تحديث تلقائي كل <span>30</span> ثانية</div>
</div>
<script>
function fmt(b){b=parseInt((b||'').replace(/[^0-9]/g,''),10)||0;if(b>=1073741824)return (b/1073741824).toFixed(2)+' GB';if(b>=1048576)return (b/1048576).toFixed(1)+' MB';if(b>=1024)return (b/1024).toFixed(0)+' KB';return b+' B';}
function tick(){var d=new Date();var h=d.getHours(),m=d.getMinutes();document.getElementById('clk').innerHTML=(h<10?'0':'')+h+':'+(m<10?'0':'')+m;}
tick();setInterval(tick,1000);
(function(){
  var u=document.getElementById('un');
  if(u&&u.innerHTML.indexOf('$')!=-1)u.innerHTML='مستخدم';
  var bi=document.getElementById('bi'),bo=document.getElementById('bo');
  if(bi&&bo&&bi.innerHTML.indexOf('$')==-1){bi.innerHTML=fmt(bi.innerHTML);bo.innerHTML=fmt(bo.innerHTML);}
  var st='$(session-time)';
  if(st.indexOf('$')==-1){
    var p=st.split(':').map(Number),s=0;
    if(p.length==2)s=p[0]*60+p[1];if(p.length==3)s=p[0]*3600+p[1]*60+p[2];
    if(s>=50*60)document.getElementById('wb').className='warn show';
  }
})();
setTimeout(function(){location.href='$(link-status)';},30000);
</script>
</body>
</html>
