<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>صافي - حالة الاتصال</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;font-family:Tahoma,Arial,sans-serif;background:#2D1B69;}
.wrap{min-height:100%;display:table;width:100%;}
.inner{display:table-cell;vertical-align:middle;padding:20px;}
.card{width:100%;max-width:400px;margin:0 auto;background:#3d2888;border:1px solid #F5C842;border-radius:12px;padding:28px 24px;box-shadow:0 8px 32px #000;}
.logo-ring{width:60px;height:60px;border-radius:50%;background:#F5C842;margin:0 auto 10px;display:table;text-align:center;}
.logo-ring svg{display:inline-block;vertical-align:middle;margin-top:12px;}
.brand{font-size:24px;font-weight:bold;color:#fff;text-align:center;letter-spacing:2px;}
.brand span{color:#F5C842;}
.sub{font-size:11px;color:rgba(255,255,255,0.6);text-align:center;margin-top:2px;}
.divider{border:none;border-top:1px solid rgba(245,200,66,0.3);margin:14px 0;}
.badge{display:block;width:120px;margin:0 auto 14px;background:rgba(74,222,128,0.15);border:1px solid rgba(74,222,128,0.4);border-radius:20px;padding:4px 0;font-size:12px;font-weight:bold;color:#4ADE80;text-align:center;}
.dot{display:inline-block;width:7px;height:7px;border-radius:50%;background:#4ADE80;margin-left:5px;vertical-align:middle;}
.user-box{background:rgba(245,200,66,0.07);border:1px solid rgba(245,200,66,0.15);border-radius:8px;padding:10px 14px;margin-bottom:14px;}
.user-name{font-size:14px;font-weight:bold;color:#fff;}
.user-ip{font-size:11px;color:rgba(255,255,255,0.5);margin-top:2px;}
.grid{display:table;width:100%;border-collapse:separate;border-spacing:6px;margin-bottom:14px;}
.grid-row{display:table-row;}
.grid-cell{display:table-cell;width:50%;background:rgba(255,255,255,0.04);border:1px solid rgba(245,200,66,0.1);border-radius:8px;padding:10px 6px;text-align:center;vertical-align:middle;}
.g-icon{font-size:16px;display:block;margin-bottom:3px;}
.g-val{font-size:14px;font-weight:bold;color:#F5C842;display:block;}
.g-lbl{font-size:10px;color:rgba(255,255,255,0.5);display:block;margin-top:2px;}
.device-row{display:table;width:100%;border-collapse:separate;border-spacing:6px;margin-bottom:14px;}
.device-cell{display:table-cell;width:50%;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.07);border-radius:8px;padding:8px;text-align:center;font-size:10px;color:rgba(255,255,255,0.5);}
.device-cell b{display:block;font-size:11px;color:rgba(255,255,255,0.7);word-break:break-all;}
.btn-row{display:table;width:100%;border-collapse:separate;border-spacing:8px;margin-bottom:10px;}
.btn-cell{display:table-cell;width:50%;}
.btn-ref{display:block;height:42px;background:rgba(245,200,66,0.1);border:1px solid rgba(245,200,66,0.25);border-radius:8px;color:#F5C842;font-family:Tahoma,Arial,sans-serif;font-size:12px;font-weight:bold;text-align:center;line-height:42px;text-decoration:none;}
.btn-ref:hover{background:rgba(245,200,66,0.18);}
.btn-out{display:block;height:42px;background:rgba(192,57,43,0.15);border:1px solid rgba(192,57,43,0.3);border-radius:8px;color:#FF8C7A;font-family:Tahoma,Arial,sans-serif;font-size:12px;font-weight:bold;text-align:center;line-height:42px;text-decoration:none;}
.btn-out:hover{background:rgba(192,57,43,0.25);}
.refresh-txt{text-align:center;font-size:10px;color:rgba(255,255,255,0.2);}
.refresh-txt span{color:rgba(245,200,66,0.5);}
</style>
</head>
<body>
<div class="wrap"><div class="inner">
<div class="card">

  <div class="logo-ring">
    <svg width="30" height="30" viewBox="0 0 40 40" fill="none">
      <path d="M20 6C12.268 6 6 12.268 6 20C6 27.732 12.268 34 20 34C27.732 34 34 27.732 34 20" stroke="#2D1B69" stroke-width="3" stroke-linecap="round"/>
      <path d="M20 12C15.582 12 12 15.582 12 20C12 24.418 15.582 28 20 28C24.418 28 28 24.418 28 20" stroke="#2D1B69" stroke-width="3" stroke-linecap="round"/>
      <circle cx="20" cy="20" r="4" fill="#2D1B69"/>
      <path d="M34 6L34 14M34 14L26 14M34 14L28 8" stroke="#2D1B69" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </div>
  <div class="brand">ص<span>ا</span>في</div>
  <div class="sub">بوابة الإنترنت اللاسلكي</div>
  <hr class="divider">

  <span class="badge"><span class="dot"></span>متصل بالإنترنت</span>

  <div class="user-box">
    <div class="user-name" id="un">$(username)</div>
    <div class="user-ip">IP: $(ip)</div>
  </div>

  <div class="grid">
    <div class="grid-row">
      <div class="grid-cell"><span class="g-icon"></span><span class="g-val">$(session-time)</span><span class="g-lbl">مدة الجلسة</span></div>
      <div class="grid-cell"><span class="g-icon"></span><span class="g-val">$(uptime)</span><span class="g-lbl">وقت الاتصال</span></div>
    </div>
    <div class="grid-row">
      <div class="grid-cell" style="padding-top:6px;"><span class="g-icon">[v]</span><span class="g-val" id="bi">$(bytes-in)</span><span class="g-lbl">وارد</span></div>
      <div class="grid-cell" style="padding-top:6px;"><span class="g-icon">[^]</span><span class="g-val" id="bo">$(bytes-out)</span><span class="g-lbl">صادر</span></div>
    </div>
  </div>

  <div class="device-row">
    <div class="device-cell"> MAC<b>$(mac)</b></div>
  </div>

  <div class="btn-row">
    <div class="btn-cell"><a class="btn-ref" href="$(link-status)"> تحديث</a></div>
    <div class="btn-cell"><a class="btn-out" href="$(link-logout)"> خروج</a></div>
  </div>

  <div class="refresh-txt">تحديث تلقائي كل <span>30</span> ثانية</div>
</div>
</div></div>
<script>
function fmt(b){
  b=parseInt((b||'').replace(/[^0-9]/g,''),10)||0;
  if(b>=1073741824)return (b/1073741824).toFixed(2)+' GB';
  if(b>=1048576)return (b/1048576).toFixed(1)+' MB';
  if(b>=1024)return (b/1024).toFixed(0)+' KB';
  return b+' B';
}
(function(){
  var bi=document.getElementById('bi'),bo=document.getElementById('bo');
  if(bi&&bo&&bi.innerHTML.indexOf('$')==-1){bi.innerHTML=fmt(bi.innerHTML);bo.innerHTML=fmt(bo.innerHTML);}
  var u=document.getElementById('un');
  if(u&&u.innerHTML.indexOf('$')!=-1)u.innerHTML='مستخدم';
})();
setTimeout(function(){location.href='$(link-status)';},30000);
</script>
</body>
</html>
