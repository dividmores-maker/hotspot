<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>صافي - جاري الاتصال</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;font-family:Tahoma,Arial,sans-serif;background:#2D1B69;}
.wrap{min-height:100%;display:table;width:100%;}
.inner{display:table-cell;vertical-align:middle;padding:20px;}
.card{width:100%;max-width:400px;margin:0 auto;background:#3d2888;border:1px solid rgba(74,222,128,0.35);border-radius:12px;padding:32px 28px;box-shadow:0 8px 32px #000;text-align:center;}
.logo-ring{width:66px;height:66px;border-radius:50%;background:#F5C842;margin:0 auto 10px;display:table;text-align:center;}
.logo-ring svg{display:inline-block;vertical-align:middle;margin-top:14px;}
.brand{font-size:26px;font-weight:bold;color:#fff;letter-spacing:2px;}
.brand span{color:#F5C842;}
.sub{font-size:12px;color:rgba(255,255,255,0.6);margin-top:3px;}
.divider{border:none;border-top:1px solid rgba(74,222,128,0.25);margin:16px 0;}
.ok-icon{font-size:52px;margin-bottom:10px;}
.ok-title{font-size:20px;font-weight:bold;color:#fff;margin-bottom:6px;}
.ok-sub{font-size:13px;color:rgba(255,255,255,0.6);margin-bottom:18px;}
.user-box{background:rgba(74,222,128,0.08);border:1px solid rgba(74,222,128,0.2);border-radius:8px;padding:10px 14px;margin-bottom:16px;text-align:right;}
.user-name{font-size:14px;font-weight:bold;color:#fff;}
.user-ip{font-size:11px;color:rgba(255,255,255,0.5);margin-top:2px;}
.steps{margin-bottom:16px;}
.step{display:table;width:100%;border:1px solid rgba(255,255,255,0.07);border-radius:8px;padding:9px 12px;margin-bottom:6px;background:rgba(255,255,255,0.03);}
.step.done{border-color:rgba(74,222,128,0.3);background:rgba(74,222,128,0.06);}
.step-icon{display:table-cell;width:28px;font-size:16px;vertical-align:middle;}
.step-txt{display:table-cell;font-size:13px;color:rgba(255,255,255,0.6);vertical-align:middle;text-align:right;padding-right:8px;}
.step.done .step-txt{color:#4ADE80;}
.step-ck{display:table-cell;width:20px;font-size:13px;vertical-align:middle;opacity:0;}
.step.done .step-ck{opacity:1;}
.cd-wrap{margin-bottom:14px;}
.cd-txt{font-size:12px;color:rgba(255,255,255,0.5);}
.cd-num{font-size:28px;font-weight:bold;color:#F5C842;}
.btn{display:block;height:48px;background:#F5C842;border-radius:10px;color:#2D1B69;font-family:Tahoma,Arial,sans-serif;font-size:16px;font-weight:bold;text-align:center;line-height:48px;text-decoration:none;}
.btn:hover{background:#D4A017;}
.footer{margin-top:18px;color:rgba(255,255,255,0.2);font-size:11px;}
.footer span{color:#F5C842;}
</style>
</head>
<body>
<div class="wrap"><div class="inner">
<div class="card">

  <div class="logo-ring">
    <svg width="34" height="34" viewBox="0 0 40 40" fill="none">
      <path d="M20 6C12.268 6 6 12.268 6 20C6 27.732 12.268 34 20 34C27.732 34 34 27.732 34 20" stroke="#2D1B69" stroke-width="3" stroke-linecap="round"/>
      <path d="M20 12C15.582 12 12 15.582 12 20C12 24.418 15.582 28 20 28C24.418 28 28 24.418 28 20" stroke="#2D1B69" stroke-width="3" stroke-linecap="round"/>
      <circle cx="20" cy="20" r="4" fill="#2D1B69"/>
      <path d="M34 6L34 14M34 14L26 14M34 14L28 8" stroke="#2D1B69" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </div>
  <div class="brand">ص<span>ا</span>في</div>
  <div class="sub">بوابة الإنترنت اللاسلكي</div>
  <hr class="divider">

  <div class="ok-icon">[OK]</div>
  <div class="ok-title">تم تسجيل الدخول بنجاح!</div>
  <div class="ok-sub">مرحباً بك، جاري توصيلك بالإنترنت</div>

  <div class="user-box">
    <div class="user-name" id="un">$(username)</div>
    <div class="user-ip" id="uip">$(ip)</div>
  </div>

  <div class="steps">
    <div class="step done" id="s1">
      <span class="step-icon"></span>
      <span class="step-txt">التحقق من بيانات الدخول</span>
      <span class="step-ck">[OK]</span>
    </div>
    <div class="step" id="s2">
      <span class="step-icon"></span>
      <span class="step-txt">الاتصال بالشبكة</span>
      <span class="step-ck">[OK]</span>
    </div>
    <div class="step" id="s3">
      <span class="step-icon"></span>
      <span class="step-txt">فتح الإنترنت</span>
      <span class="step-ck">[OK]</span>
    </div>
  </div>

  <div class="cd-wrap">
    <div class="cd-txt">التحويل التلقائي خلال</div>
    <div class="cd-num" id="cdn">5</div>
  </div>

  <a class="btn" id="gbtn" href="$(link-orig)"> انتقل الآن</a>

  <div class="footer">مدعوم بواسطة <span>MikroTik</span> &middot; شبكة <span>صافي</span></div>
</div>
</div></div>
<script>
(function(){
  var u=document.getElementById('un'),ip=document.getElementById('uip');
  if(u&&u.innerHTML.indexOf('$')!=-1)u.innerHTML='مستخدم';
  if(ip&&ip.innerHTML.indexOf('$')!=-1)ip.innerHTML='جاري الاتصال...';
  var btn=document.getElementById('gbtn');
  if(btn&&btn.href.indexOf('$')!=-1)btn.href='$(link-status)';
})();
setTimeout(function(){var d=document.getElementById('s2');if(d)d.className='step done';},800);
setTimeout(function(){var d=document.getElementById('s3');if(d)d.className='step done';},1600);
var cd=5,el=document.getElementById('cdn');
var t=setInterval(function(){
  cd--;el.innerHTML=cd;
  if(cd<=0){clearInterval(t);location.href=document.getElementById('gbtn').href;}
},1000);
</script>
</body>
</html>
